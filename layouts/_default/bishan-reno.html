{{ define "main" }}
<style>
  /* Hide site chrome for full-screen 3D experience */
  .site-header, .site-footer, .newsletter, .page-header { display: none !important; }
  body { overflow: hidden !important; margin: 0 !important; padding: 0 !important; }
  main, .main-wide, article, .page-content { margin: 0 !important; padding: 0 !important; max-width: none !important; width: 100vw !important; height: 100vh !important; }
  .reno-wrapper { position: fixed; inset: 0; z-index: 9999; background: #111; }
  .reno-wrapper iframe { width: 100%; height: 100%; border: none; }
  .reno-back { position: fixed; top: 12px; right: 16px; z-index: 10000; background: rgba(0,0,0,0.7); color: #ccc; border: 1px solid rgba(255,255,255,0.2); padding: 8px 16px; font-size: 12px; font-family: monospace; cursor: pointer; text-decoration: none; border-radius: 4px; }
  .reno-back:hover { color: #fff; background: rgba(0,0,0,0.9); }
</style>

<a href="/projects/" class="reno-back">← Projects</a>
<div class="reno-wrapper">
  <iframe src="/projects/bishan-reno/app.html" allow="fullscreen"></iframe>
</div>
{{ end }}
